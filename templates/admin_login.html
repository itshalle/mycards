{% extends 'base.html' %}

{% block content %}

<div class="max-w-sm mx-auto mt-20">
    <div class="card p-8 text-center">
        <div class="text-5xl mb-6">🔐</div>
<div class="flex items-center justify-between mb-10">
    <h1 class="text-3xl font-bold">پنل مدیریت</h1>
    <a href="/admin/logout" class="text-sm text-gray-400 hover:text-red-400 transition">خروج</a>
</div>        <p class="text-gray-400 text-sm mb-8">برای ورود رمز عبور را وارد کنید</p>

        {% if error %}
        <div class="bg-red-50 text-red-400 rounded-xl px-4 py-3 mb-6 text-sm">
            رمز عبور اشتباه است
        </div>
        {% endif %}

        <form action="/admin" method="POST" class="flex flex-col gap-4">
            <input 
                type="password" 
                name="password" 
                required
                placeholder="رمز عبور"
                class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-[#7B9E87] transition text-center"
            >
            <button type="submit" class="btn-primary font-semibold">ورود</button>
        </form>
    </div>
</div>

{% endblock %}
