<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta_title or 'Only Cards | کارت‌های فارسی برای آرامش و گفت‌وگو' }}</title>
    <meta name="description" content="{{ meta_description or 'Only Cards برند کارت‌های فارسی برای آرامش، رابطه، گفت‌وگو، تأمل و mindful play است.' }}">
    <meta name="robots" content="{{ meta_robots or 'index, follow' }}">
    <link rel="canonical" href="{{ canonical_url or request.base_url }}">

    <meta property="og:site_name" content="Only Cards">
    <meta property="og:title" content="{{ meta_title or 'Only Cards' }}">
    <meta property="og:description" content="{{ meta_description or 'کارت‌های فارسی برای آرامش، رابطه، گفت‌وگو و لحظه‌های mindful.' }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ canonical_url or request.base_url }}">

    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon_io/apple-touch-icon.png') }}?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon_io/favicon-32x32.png') }}?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon_io/favicon-16x16.png') }}?v=3">
    <link rel="manifest" href="{{ url_for('static', filename='favicon_io/site.webmanifest') }}?v=3">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon_io/favicon.ico') }}?v=3">

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold text-[#7B9E87]">Only Cards</a>
            <div class="flex items-center gap-6">
                <a href="/" class="text-gray-600 hover:text-[#7B9E87] transition">خانه</a>
                <a href="/shop" class="text-gray-600 hover:text-[#7B9E87] transition">فروشگاه</a>
                <a href="/about" class="text-gray-600 hover:text-[#7B9E87] transition">درباره ما</a>
                <a href="/cart" class="relative text-gray-600 hover:text-[#7B9E87] transition">
                    🛒
                    {% if session.get('cart') %}
                    <span class="absolute -top-2 -right-2 bg-[#7B9E87] text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">
                        {{ session['cart']|length }}
                    </span>
                    {% endif %}
                </a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-6xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-20 py-10 text-center text-gray-400 text-sm">

    <p class="text-[#7B9E87] font-semibold text-lg mb-2">Only Cards</p>

    <p>کارت‌هاتو رو کن</p> 

    <div class="mt-4 flex flex-wrap items-center justify-center gap-4">
        <a href="/about" class="text-gray-500 hover:text-[#7B9E87] transition">درباره ما</a>
        <a href="/shipping" class="text-gray-500 hover:text-[#7B9E87] transition">ارسال و تحویل</a>
        <a href="/faq" class="text-gray-500 hover:text-[#7B9E87] transition">سوالات پرتکرار</a>
    </div>



    <a href="https://t.me/onlycards724" 

       target="_blank"

       rel="noopener noreferrer"

       class="inline-block mt-4 text-[#7B9E87] hover:text-[#6a8d76] font-semibold transition">

        ارتباط با ما در تلگرام: @onlycards724 

    </a>



    <p class="mt-4">© ۱۴۰۵ تمام حقوق محفوظ است</p> 

</footer>

</body>
</html>
