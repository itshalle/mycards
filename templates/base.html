<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #F7F4F0;
            color: #2C2C2C;
        }
        .btn-primary {
            background-color: #7B9E87;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #6a8d76;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-bold text-[#7B9E87]">Only Cards</a>
            <div class="flex items-center gap-6">
                <a href="/" class="text-gray-600 hover:text-[#7B9E87] transition">خانه</a>
                <a href="/shop" class="text-gray-600 hover:text-[#7B9E87] transition">فروشگاه</a>
                <a href="/cart" class="relative text-gray-600 hover:text-[#7B9E87] transition">
                    🛒
                    {% if session.get('cart') %}
                    <span class="absolute -top-2 -right-2 bg-[#7B9E87] text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">
                        {{ session['cart']|length }}
                    </span>
                    {% endif %}
                </a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-6xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-20 py-10 text-center text-gray-400 text-sm">
        <p class="text-[#7B9E87] font-semibold text-lg mb-2">Only Cards</p>
        <p>کارت‌هایی برای لحظه‌های واقعی زندگی</p>
        <p class="mt-4">© ۱۴۰۳ تمام حقوق محفوظ است</p>
    </footer>

</body>
</html>
